version: '3.8'

services:
  app:
    build: .
    container_name: daycost-app
    ports:
      - "4567:80"
    environment:
      - PORT=80
      # SECURITY: JWT_SECRET must be set in .env file or Docker secrets
      # Generate with: openssl rand -hex 32
      - JWT_SECRET=${JWT_SECRET}
      # SECURITY: TOTP_KEY must be set independently from JWT_SECRET
      # Generate with: openssl rand -hex 16 (produces exactly 32 UTF-8 bytes)
      - TOTP_KEY=${TOTP_KEY}
      - DB_PATH=/data/data.db
    env_file:
      - .env  # Load secrets from .env file (create this file with your secrets)
    volumes:
      # 1. 挂载持久化数据库结构
      - ./data:/data
      # 2. 挂载 public 前端静态文件，每次前端更新无需重启，即刻生效！
      - ./public:/usr/src/app/public
      # 3. 挂载后端入口文件
      - ./server.js:/usr/src/app/server.js
      # 4. 挂载后端源码（routes/middlewares/config/utils），更新后重启即可生效
      - ./src:/usr/src/app/src
      # 5. 保护容器内部构建好的原生依赖 (如由源码构建的 sqlite3)，防止被宿主机覆盖
      - /usr/src/app/node_modules
    restart: always
